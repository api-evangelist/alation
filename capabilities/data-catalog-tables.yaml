naftiko: 1.0.0-alpha2
info:
  label: Alation Data Catalog API — Tables
  description: 'Alation Data Catalog API — Tables. 2 operations. Lead operation: List tables. Self-contained Naftiko capability
    covering one Alation business surface.'
  tags:
  - Alation
  - Tables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALATION_API_KEY: ALATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-catalog-tables
    baseUri: https://{instance}/integration/v2
    description: Alation Data Catalog API — Tables business capability. Self-contained, no shared references.
    resources:
    - name: table
      path: /table/
      operations:
      - name: listtables
        method: GET
        description: List tables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: schema_id
          in: query
          type: integer
          description: Schema ID to filter tables
        - name: ds_id
          in: query
          type: integer
          description: Data source ID to filter tables
        - name: limit
          in: query
          type: integer
        - name: skip
          in: query
          type: integer
    - name: table-id
      path: /table/{id}/
      operations:
      - name: gettable
        method: GET
        description: Get a table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
    authentication:
      type: bearer
      token: '{{env.ALATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-catalog-tables-rest
    port: 8080
    description: REST adapter for Alation Data Catalog API — Tables. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/table
      name: table
      description: REST surface for table.
      operations:
      - method: GET
        name: listtables
        description: List tables
        call: data-catalog-tables.listtables
        with:
          schema_id: rest.schema_id
          ds_id: rest.ds_id
          limit: rest.limit
          skip: rest.skip
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/table/{id}
      name: table-id
      description: REST surface for table-id.
      operations:
      - method: GET
        name: gettable
        description: Get a table
        call: data-catalog-tables.gettable
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-catalog-tables-mcp
    port: 9090
    transport: http
    description: MCP adapter for Alation Data Catalog API — Tables. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-tables
      description: List tables
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-catalog-tables.listtables
      with:
        schema_id: tools.schema_id
        ds_id: tools.ds_id
        limit: tools.limit
        skip: tools.skip
      outputParameters:
      - type: object
        mapping: $.
    - name: get-table
      description: Get a table
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-catalog-tables.gettable
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.

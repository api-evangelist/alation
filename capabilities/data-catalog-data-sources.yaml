naftiko: 1.0.0-alpha2
info:
  label: Alation Data Catalog API — Data Sources
  description: 'Alation Data Catalog API — Data Sources. 2 operations. Lead operation: List data sources. Self-contained Naftiko
    capability covering one Alation business surface.'
  tags:
  - Alation
  - Data Sources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALATION_API_KEY: ALATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-catalog-data-sources
    baseUri: https://{instance}/integration/v2
    description: Alation Data Catalog API — Data Sources business capability. Self-contained, no shared references.
    resources:
    - name: datasource
      path: /datasource/
      operations:
      - name: listdatasources
        method: GET
        description: List data sources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Number of results to return
        - name: skip
          in: query
          type: integer
          description: Number of results to skip for pagination
    - name: datasource-id
      path: /datasource/{id}/
      operations:
      - name: getdatasource
        method: GET
        description: Get a data source
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: Data source ID
          required: true
    authentication:
      type: bearer
      token: '{{env.ALATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-catalog-data-sources-rest
    port: 8080
    description: REST adapter for Alation Data Catalog API — Data Sources. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/datasource
      name: datasource
      description: REST surface for datasource.
      operations:
      - method: GET
        name: listdatasources
        description: List data sources
        call: data-catalog-data-sources.listdatasources
        with:
          limit: rest.limit
          skip: rest.skip
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasource/{id}
      name: datasource-id
      description: REST surface for datasource-id.
      operations:
      - method: GET
        name: getdatasource
        description: Get a data source
        call: data-catalog-data-sources.getdatasource
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-catalog-data-sources-mcp
    port: 9090
    transport: http
    description: MCP adapter for Alation Data Catalog API — Data Sources. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-data-sources
      description: List data sources
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-catalog-data-sources.listdatasources
      with:
        limit: tools.limit
        skip: tools.skip
      outputParameters:
      - type: object
        mapping: $.
    - name: get-data-source
      description: Get a data source
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-catalog-data-sources.getdatasource
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.

      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: lineage-dataflows.createdataflow
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataflow
      description: Get a dataflow
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: lineage-dataflows.getdataflow
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-dataflow
      description: Update a dataflow
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: lineage-dataflows.updatedataflow
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-dataflow
      description: Delete a dataflow
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: lineage-dataflows.deletedataflow
      with:

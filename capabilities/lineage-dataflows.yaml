    namespace: lineage-dataflows
    baseUri: https://{instance}/api/v1
    description: Alation Lineage API — Dataflows business capability. Self-contained, no shared references.
    resources:
    - name: dataflow
      path: /dataflow/
      operations:
      - name: listdataflows
        method: GET
        description: List dataflows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: skip
          in: query
          type: integer
      - name: createdataflow
        method: POST
        description: Create a dataflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: dataflow-id
      path: /dataflow/{id}/
      operations:
      - name: getdataflow
        method: GET
        description: Get a dataflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
      - name: updatedataflow
        method: PUT
        description: Update a dataflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletedataflow
        method: DELETE
        description: Delete a dataflow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
    authentication:
      type: bearer
      token: '{{env.ALATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: lineage-dataflows-rest
    port: 8080
    description: REST adapter for Alation Lineage API — Dataflows. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/dataflow
      name: dataflow
      description: REST surface for dataflow.
      operations:
      - method: GET
        name: listdataflows
        description: List dataflows
        call: lineage-dataflows.listdataflows
        with:
          limit: rest.limit
          skip: rest.skip
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createdataflow
        description: Create a dataflow
        call: lineage-dataflows.createdataflow
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dataflow/{id}
      name: dataflow-id
      description: REST surface for dataflow-id.
      operations:
      - method: GET
        name: getdataflow
        description: Get a dataflow
        call: lineage-dataflows.getdataflow
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatedataflow
        description: Update a dataflow
        call: lineage-dataflows.updatedataflow
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedataflow
        description: Delete a dataflow
        call: lineage-dataflows.deletedataflow
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp

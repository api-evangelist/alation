naftiko: 1.0.0-alpha2
info:
  label: Alation Data Catalog API — Columns
  description: 'Alation Data Catalog API — Columns. 1 operations. Lead operation: List columns. Self-contained Naftiko capability
    covering one Alation business surface.'
  tags:
  - Alation
  - Columns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ALATION_API_KEY: ALATION_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-catalog-columns
    baseUri: https://{instance}/integration/v2
    description: Alation Data Catalog API — Columns business capability. Self-contained, no shared references.
    resources:
    - name: attribute
      path: /attribute/
      operations:
      - name: listcolumns
        method: GET
        description: List columns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: table_id
          in: query
          type: integer
          description: Table ID to filter columns
          required: true
        - name: limit
          in: query
          type: integer
        - name: skip
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.ALATION_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-catalog-columns-rest
    port: 8080
    description: REST adapter for Alation Data Catalog API — Columns. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/attribute
      name: attribute
      description: REST surface for attribute.
      operations:
      - method: GET
        name: listcolumns
        description: List columns
        call: data-catalog-columns.listcolumns
        with:
          table_id: rest.table_id
          limit: rest.limit
          skip: rest.skip
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-catalog-columns-mcp
    port: 9090
    transport: http
    description: MCP adapter for Alation Data Catalog API — Columns. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-columns
      description: List columns
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-catalog-columns.listcolumns
      with:
        table_id: tools.table_id
        limit: tools.limit
        skip: tools.skip
      outputParameters:
      - type: object
        mapping: $.

naftiko: "1.0.0-alpha1"

info:
  label: Alation Data Intelligence
  description: >-
    Workflow capability for data intelligence operations combining catalog search,
    lineage tracking, governance, and metadata management in the Alation platform.
    Enables data stewards, analysts, and AI agents to discover trusted data assets,
    track data lineage, enforce governance policies, and maintain data quality.
  tags:
    - Alation
    - Data Catalog
    - Data Intelligence
    - Governance
    - Lineage
    - Data Quality
    - Search
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ALATION_HOST: ALATION_HOST
      ALATION_TOKEN: ALATION_TOKEN

capability:
  consumes:
    - import: alation-data-catalog
      location: ./shared/data-catalog-api.yaml
    - import: alation-lineage
      location: ./shared/lineage-api.yaml
    - import: alation-governance
      location: ./shared/governance-api.yaml
    - import: alation-search
      location: ./shared/search-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: alation-data-intelligence-api
      description: Unified REST API for Alation data intelligence workflows.
      resources:
        - path: /v1/search
          name: search
          description: Search the Alation catalog
          operations:
            - method: GET
              name: search-catalog
              description: Search all Alation catalog objects
              call: "alation-search.search-catalog"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/datasources
          name: datasources
          description: List data sources
          operations:
            - method: GET
              name: list-datasources
              description: List all data sources
              call: "alation-data-catalog.list-datasources"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/lineage
          name: lineage
          description: Get data lineage
          operations:
            - method: GET
              name: get-lineage
              description: Get lineage for a catalog object
              call: "alation-lineage.get-lineage"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/glossary
          name: glossary
          description: Business glossary terms
          operations:
            - method: GET
              name: list-glossary-terms
              description: List glossary terms
              call: "alation-governance.list-glossary-terms"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: alation-data-intelligence-mcp
      transport: http
      description: MCP server for AI-assisted Alation data intelligence workflows.
      tools:
        - name: search-alation-catalog
          description: >-
            Search the Alation data catalog for tables, columns, data sources,
            glossary terms, and articles. Returns ranked results with metadata.
          hints:
            readOnly: true
            openWorld: false
          call: "alation-search.search-catalog"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-alation-context
          description: >-
            Get aggregated context from Alation for AI-powered data discovery.
            Returns structured catalog information for a natural language query.
          hints:
            readOnly: true
            openWorld: false
          call: "alation-search.get-aggregated-context"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-alation-datasources
          description: List all data sources configured in the Alation catalog.
          hints:
            readOnly: true
            openWorld: false
          call: "alation-data-catalog.list-datasources"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-alation-tables
          description: List tables in an Alation schema or data source.
          hints:
            readOnly: true
            openWorld: false
          call: "alation-data-catalog.list-tables"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-alation-columns
          description: List columns for a table in the Alation catalog.
          hints:
            readOnly: true
            openWorld: false
          call: "alation-data-catalog.list-columns"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-alation-lineage
          description: >-
            Get upstream and downstream data lineage for a catalog object in Alation,
            showing how data flows between tables and systems.
          hints:
            readOnly: true
            openWorld: false
          call: "alation-lineage.get-lineage"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-alation-glossary-terms
          description: List business glossary terms from the Alation catalog.
          hints:
            readOnly: true
            openWorld: false
          call: "alation-governance.list-glossary-terms"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-alation-data-quality
          description: Get data quality scores for a catalog object in Alation.
          hints:
            readOnly: true
            openWorld: false
          call: "alation-governance.get-dq-scores"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-alation-policies
          description: List data governance policies in the Alation catalog.
          hints:
            readOnly: true
            openWorld: false
          call: "alation-governance.list-policies"
          outputParameters:
            - type: array
              mapping: "$."

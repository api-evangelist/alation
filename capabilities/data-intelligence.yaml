naftiko: 1.0.0-alpha2
info:
  label: Alation Data Intelligence
  description: Workflow capability for data intelligence operations combining catalog search, lineage tracking, governance,
    and metadata management in the Alation platform. Enables data stewards, analysts, and AI agents to discover trusted data
    assets, track data lineage, enforce governance policies, and maintain data quality.
  tags:
  - Alation
  - Data Catalog
  - Data Intelligence
  - Governance
  - Lineage
  - Data Quality
  - Search
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ALATION_HOST: ALATION_HOST
    ALATION_TOKEN: ALATION_TOKEN
capability:
  consumes:
  - type: http
    namespace: alation-data-catalog
    baseUri: https://{{env.ALATION_HOST}}/integration/v2
    description: Alation Data Catalog REST API
    auth:
      type: bearer
      token: '{{env.ALATION_TOKEN}}'
    resources:
    - name: datasources
      path: /datasource/
      description: Data source connections
      operations:
      - name: list-datasources
        method: GET
        description: List all data sources in the Alation catalog
        outputParameters:
        - name: datasources
          type: array
          value: $.
      - name: get-datasource
        method: GET
        description: Get a specific data source by ID
        inputParameters:
        - name: id
          type: integer
          in: path
        outputParameters:
        - name: datasource
          type: object
          value: $.
    - name: schemas
      path: /schema/
      description: Database schemas
      operations:
      - name: list-schemas
        method: GET
        description: List schemas for a data source
        inputParameters:
        - name: ds_id
          type: integer
          in: query
        outputParameters:
        - name: schemas
          type: array
          value: $.
    - name: tables
      path: /table/
      description: Database tables
      operations:
      - name: list-tables
        method: GET
        description: List tables for a schema or data source
        inputParameters:
        - name: schema_id
          type: integer
          in: query
        outputParameters:
        - name: tables
          type: array
          value: $.
      - name: get-table
        method: GET
        description: Get a specific table by ID
        inputParameters:
        - name: id
          type: integer
          in: path
        outputParameters:
        - name: table
          type: object
          value: $.
    - name: columns
      path: /attribute/
      description: Table columns
      operations:
      - name: list-columns
        method: GET
        description: List columns for a table
        inputParameters:
        - name: table_id
          type: integer
          in: query
        outputParameters:
        - name: columns
          type: array
          value: $.
    - name: custom-fields
      path: /custom_field_value/
      description: Custom field values for catalog objects
      operations:
      - name: get-custom-field-values
        method: GET
        description: Get custom field values for a catalog object
        inputParameters:
        - name: object_type
          type: string
          in: query
        - name: object_id
          type: integer
          in: query
        outputParameters:
        - name: custom_fields
          type: array
          value: $.
      - name: update-custom-field-values
        method: PUT
        description: Batch update custom field values
        inputParameters:
        - name: body
          type: array
          in: body
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: alation-lineage
    baseUri: https://{{env.ALATION_HOST}}/api/v1
    description: Alation Lineage REST API
    auth:
      type: bearer
      token: '{{env.ALATION_TOKEN}}'
    resources:
    - name: dataflows
      path: /dataflow/
      description: Dataflow lineage objects
      operations:
      - name: list-dataflows
        method: GET
        description: List all dataflow objects
        outputParameters:
        - name: dataflows
          type: array
          value: $.
      - name: create-dataflow
        method: POST
        description: Create a new dataflow object
        inputParameters:
        - name: body
          type: object
          in: body
        outputParameters:
        - name: dataflow
          type: object
          value: $.
      - name: get-dataflow
        method: GET
        description: Get a specific dataflow by ID
        inputParameters:
        - name: id
          type: integer
          in: path
        outputParameters:
        - name: dataflow
          type: object
          value: $.
      - name: delete-dataflow
        method: DELETE
        description: Delete a dataflow object
        inputParameters:
        - name: id
          type: integer
          in: path
    - name: lineage
      path: /lineage/
      description: Lineage graph retrieval
      operations:
      - name: get-lineage
        method: GET
        description: Get upstream and downstream lineage for a catalog object
        inputParameters:
        - name: object_type
          type: string
          in: query
        - name: object_id
          type: integer
          in: query
        - name: direction
          type: string
          in: query
        outputParameters:
        - name: lineage_graph
          type: object
          value: $.
  - type: http
    namespace: alation-governance
    baseUri: https://{{env.ALATION_HOST}}/integration/v2
    description: Alation Governance REST API
    auth:
      type: bearer
      token: '{{env.ALATION_TOKEN}}'
    resources:
    - name: glossary-terms
      path: /glossary_term/
      description: Business glossary terms
      operations:
      - name: list-glossary-terms
        method: GET
        description: List business glossary terms
        outputParameters:
        - name: terms
          type: array
          value: $.
      - name: create-glossary-term
        method: POST
        description: Create a glossary term
        inputParameters:
        - name: body
          type: object
          in: body
        outputParameters:
        - name: term
          type: object
          value: $.
      - name: get-glossary-term
        method: GET
        description: Get a glossary term by ID
        inputParameters:
        - name: id
          type: integer
          in: path
        outputParameters:
        - name: term
          type: object
          value: $.
    - name: policies
      path: /policy/
      description: Data governance policies
      operations:
      - name: list-policies
        method: GET
        description: List governance policies
        outputParameters:
        - name: policies
          type: array
          value: $.
    - name: data-quality-rules
      path: /data_quality/rule/
      description: Data quality rules
      operations:
      - name: list-dq-rules
        method: GET
        description: List data quality rules
        outputParameters:
        - name: rules
          type: array
          value: $.
    - name: data-quality-scores
      path: /data_quality/score/
      description: Data quality scores
      operations:
      - name: get-dq-scores
        method: GET
        description: Get data quality scores for a catalog object
        inputParameters:
        - name: object_type
          type: string
          in: query
        - name: object_id
          type: integer
          in: query
        outputParameters:
        - name: scores
          type: array
          value: $.
  - type: http
    namespace: alation-search
    baseUri: https://{{env.ALATION_HOST}}/integration/v2
    description: Alation Search REST API
    auth:
      type: bearer
      token: '{{env.ALATION_TOKEN}}'
    resources:
    - name: search
      path: /search/
      description: Full-text catalog search
      operations:
      - name: search-catalog
        method: GET
        description: Search all catalog objects
        inputParameters:
        - name: q
          type: string
          in: query
        - name: type
          type: string
          in: query
        - name: limit
          type: integer
          in: query
        outputParameters:
        - name: results
          type: object
          value: $.
    - name: aggregated-context
      path: /aggregated_context/
      description: Aggregated catalog context for AI applications
      operations:
      - name: get-aggregated-context
        method: POST
        description: Get aggregated catalog context for a natural language query
        inputParameters:
        - name: body
          type: object
          in: body
        outputParameters:
        - name: context
          type: object
          value: $.
    - name: articles
      path: /article/
      description: Catalog articles and wiki pages
      operations:
      - name: list-articles
        method: GET
        description: List catalog articles
        outputParameters:
        - name: articles
          type: array
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: alation-data-intelligence-api
    description: Unified REST API for Alation data intelligence workflows.
    resources:
    - path: /v1/search
      name: search
      description: Search the Alation catalog
      operations:
      - method: GET
        name: search-catalog
        description: Search all Alation catalog objects
        call: alation-search.search-catalog
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasources
      name: datasources
      description: List data sources
      operations:
      - method: GET
        name: list-datasources
        description: List all data sources
        call: alation-data-catalog.list-datasources
        outputParameters:
        - type: array
          mapping: $.
    - path: /v1/lineage
      name: lineage
      description: Get data lineage
      operations:
      - method: GET
        name: get-lineage
        description: Get lineage for a catalog object
        call: alation-lineage.get-lineage
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/glossary
      name: glossary
      description: Business glossary terms
      operations:
      - method: GET
        name: list-glossary-terms
        description: List glossary terms
        call: alation-governance.list-glossary-terms
        outputParameters:
        - type: array
          mapping: $.
  - type: mcp
    port: 9090
    namespace: alation-data-intelligence-mcp
    transport: http
    description: MCP server for AI-assisted Alation data intelligence workflows.
    tools:
    - name: search-alation-catalog
      description: Search the Alation data catalog for tables, columns, data sources, glossary terms, and articles. Returns
        ranked results with metadata.
      hints:
        readOnly: true
        openWorld: false
      call: alation-search.search-catalog
      outputParameters:
      - type: object
        mapping: $.
    - name: get-alation-context
      description: Get aggregated context from Alation for AI-powered data discovery. Returns structured catalog information
        for a natural language query.
      hints:
        readOnly: true
        openWorld: false
      call: alation-search.get-aggregated-context
      outputParameters:
      - type: object
        mapping: $.
    - name: list-alation-datasources
      description: List all data sources configured in the Alation catalog.
      hints:
        readOnly: true
        openWorld: false
      call: alation-data-catalog.list-datasources
      outputParameters:
      - type: array
        mapping: $.
    - name: list-alation-tables
      description: List tables in an Alation schema or data source.
      hints:
        readOnly: true
        openWorld: false
      call: alation-data-catalog.list-tables
      outputParameters:
      - type: array
        mapping: $.
    - name: list-alation-columns
      description: List columns for a table in the Alation catalog.
      hints:
        readOnly: true
        openWorld: false
      call: alation-data-catalog.list-columns
      outputParameters:
      - type: array
        mapping: $.
    - name: get-alation-lineage
      description: Get upstream and downstream data lineage for a catalog object in Alation, showing how data flows between
        tables and systems.
      hints:
        readOnly: true
        openWorld: false
      call: alation-lineage.get-lineage
      outputParameters:
      - type: object
        mapping: $.
    - name: list-alation-glossary-terms
      description: List business glossary terms from the Alation catalog.
      hints:
        readOnly: true
        openWorld: false
      call: alation-governance.list-glossary-terms
      outputParameters:
      - type: array
        mapping: $.
    - name: get-alation-data-quality
      description: Get data quality scores for a catalog object in Alation.
      hints:
        readOnly: true
        openWorld: false
      call: alation-governance.get-dq-scores
      outputParameters:
      - type: array
        mapping: $.
    - name: list-alation-policies
      description: List data governance policies in the Alation catalog.
      hints:
        readOnly: true
        openWorld: false
      call: alation-governance.list-policies
      outputParameters:
      - type: array
        mapping: $.

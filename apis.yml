    title: Data Intelligence Workflow
  - type: Features
    data:
      - name: Data Catalog
        description: >-
          Centralized catalog for data sources, schemas, tables, and columns
          with rich metadata, descriptions, and custom fields for discoverability.
      - name: Data Lineage
        description: >-
          End-to-end data lineage tracking via dataflow objects showing how
          data moves between sources, transformations, and targets.
      - name: Business Glossary
        description: >-
          Collaborative business glossary for defining standardized terms,
          abbreviations, and synonyms with stewardship assignments.
      - name: Data Quality
        description: >-
          Comprehensive data quality rules covering accuracy, completeness,
          consistency, timeliness, uniqueness, validity, and custom dimensions.
      - name: Governance Policies
        description: >-
          Governance policy management for data protection, retention,
          access control, and quality enforcement across the enterprise.
      - name: AI-Powered Search
        description: >-
          Full-text and semantic search powered by AI for discovering trusted
          data assets, with aggregated context for LLM consumption.
      - name: Aggregated Context API
        description: >-
          Specialized API for AI applications to retrieve structured catalog
          context for natural language queries, enabling RAG and AI agent workflows.
      - name: Custom Fields
        description: >-
          Extensible metadata framework with custom fields for any catalog object
          type, supporting batch updates via the REST API.
  - type: UseCases
    data:
      - name: Enterprise Data Discovery
        description: >-
          Enable data teams to search and find trusted data assets across all
          data sources using metadata-enriched catalog browsing and search.
      - name: Data Governance Compliance
        description: >-
          Enforce data governance policies, maintain business glossaries, and
          track stewardship for regulatory compliance and data accountability.
      - name: AI Data Context
        description: >-
          Power AI applications with structured catalog context from the
          aggregated context API, enabling accurate data-aware LLM responses.
      - name: Data Lineage Auditing
        description: >-
          Track data flows between systems for compliance auditing, impact
          analysis, and root cause investigation of data quality issues.
      - name: Data Quality Management
        description: >-
          Define and score data quality rules across catalog objects for
          continuous quality monitoring and improvement workflows.
  - type: Integrations
    data:
      - name: Snowflake
        description: >-
          Native Snowflake integration for automatic metadata harvesting and
          query log analysis to build comprehensive data lineage.
      - name: dbt
        description: >-
          dbt integration for capturing transformation lineage and linking
          dbt models to physical tables in the Alation catalog.
      - name: Tableau
        description: >-
          BI metadata integration for cataloging Tableau reports and
          dashboards with lineage to underlying data sources.
      - name: Python SDK
        description: >-
          Official Python SDK and AI Agent SDK for programmatic access to
          Alation catalog APIs and AI agent development.
      - name: Apache Atlas
        description: >-
          Integration with Apache Atlas for federated metadata management
          across heterogeneous data platforms.

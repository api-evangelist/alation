specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Alation
providerId: alation
publisherName: Alation, Inc.
serviceCategory: Data Intelligence Platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Data Catalog
  - Data Governance
  - Data Intelligence
  - Data Lineage
  - Data Quality
  - Metadata Management
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Alation: enterprise platform subscriptions sold by edition + seats
  with API access included. Public pricing is gated behind a "Request Pricing" form, so per-seat / per-edition
  rates are not authoritative until reconciled with the negotiated quote.'
sources:
  - https://www.alation.com/pricing/
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Alation Data Intelligence Platform
  ServiceCategory: Data Intelligence Platform
  ProviderName: Alation
  PublisherName: Alation, Inc.
  InvoiceIssuerName: Alation, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: platform_subscription
    description: Annual platform subscription value
    unit: contract-year
    aggregation: sum
    dimensions:
      - edition
      - deployment
  - name: seats
    description: Named user seats (steward / curator / consumer)
    unit: seat
    aggregation: max
    dimensions:
      - role
      - region
  - name: connectors
    description: Source-system connector licenses where billed separately
    unit: connector
    aggregation: max
    dimensions:
      - source
principles:
  - name: Visibility
    description: Surface Alation seat utilization and connector inventory through the Alation admin console;
      reconcile against annual invoices.
  - name: Allocation
    description: Allocate Alation cost across data domains and stewardship teams using seat assignments
      and curator workload.
  - name: Optimization
    description: Reclaim inactive seats during renewals; consolidate redundant connectors; align edition
      to actual feature usage.
  - name: Accountability
    description: Data governance / chief data office typically owns the Alation contract; integrate spend
      into the data-platform budget review.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

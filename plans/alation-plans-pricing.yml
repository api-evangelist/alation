specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Alation
providerId: alation
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Data Catalog
  - Data Governance
  - Data Intelligence
  - Data Lineage
  - Data Quality
  - Business Glossary
  - Metadata Management
